<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiSense AI — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
        }
        .brand-logo span { color: #4fc3f7; }
        .btn-login {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { opacity: 0.9; }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1.5px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79,195,247,0.15);
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            z-index: 10;
        }
        .input-icon input {
            padding-left: 40px;
        }
        .divider {
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="login-card">

        <!-- Brand -->
        <div class="text-center mb-4">
            <div class="brand-logo">
                <i class="bi bi-cpu"></i>
                Logi<span>Sense</span> AI
            </div>
            <p class="text-muted mt-2 mb-0">Sistem Manajemen Perawatan Kendaraan</p>
        </div>

        <div class="divider"></div>

        <!-- Error -->
        {% if form.errors %}
        <div class="alert alert-danger rounded-3 py-2 small">
            <i class="bi bi-exclamation-circle"></i>
            Username atau password salah. Silakan coba lagi.
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold text-dark">Username</label>
                <div class="input-icon">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Masukkan username" autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-dark">Password</label>
                <div class="input-icon">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Masukkan password" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-login btn-primary text-white">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk ke Sistem
                </button>
            </div>
        </form>

        <div class="divider"></div>

        <p class="text-center text-muted small mb-0">
            <i class="bi bi-shield-lock"></i>
            Hanya pengguna terdaftar yang dapat mengakses sistem ini
        </p>

    </div>
</body>
</html>
